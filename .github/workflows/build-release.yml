name: Build and release Ghostty .deb

on:
  workflow_dispatch:
    inputs:
      ghostty_version:
        description: "Ghostty version to build (blank = Dockerfile default)"
        required: false
        default: ""
      zig_version:
        description: "Zig version to build with (blank = Dockerfile default)"
        required: false
        default: ""
      pkg_revision:
        description: "Debian package revision (bump for a rebuild-only release)"
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      ghostty_version: ${{ steps.vars.outputs.ghostty_version }}
      zig_version: ${{ steps.vars.outputs.zig_version }}
      pkg_revision: ${{ steps.vars.outputs.pkg_revision }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: |
          GHOSTTY_VERSION="${{ inputs.ghostty_version }}"
          if [ -z "$GHOSTTY_VERSION" ]; then
            GHOSTTY_VERSION="$(grep -m1 '^ARG GHOSTTY_VERSION=' Dockerfile | cut -d= -f2)"
          fi
          ZIG_VERSION="${{ inputs.zig_version }}"
          if [ -z "$ZIG_VERSION" ]; then
            ZIG_VERSION="$(grep -m1 '^ARG ZIG_VERSION=' Dockerfile | cut -d= -f2)"
          fi
          PKG_REVISION="${{ inputs.pkg_revision }}"
          echo "ghostty_version=$GHOSTTY_VERSION" >> "$GITHUB_OUTPUT"
          echo "zig_version=$ZIG_VERSION" >> "$GITHUB_OUTPUT"
          echo "pkg_revision=$PKG_REVISION" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite: [stable, testing]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build .deb
        run: |
          docker build \
            --build-arg DEBIAN_SUITE=${{ matrix.suite }} \
            --build-arg GHOSTTY_VERSION=${{ needs.resolve.outputs.ghostty_version }} \
            --build-arg ZIG_VERSION=${{ needs.resolve.outputs.zig_version }} \
            --build-arg PKG_REVISION=${{ needs.resolve.outputs.pkg_revision }} \
            --output=build .
      - uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.suite }}
          path: build/*.deb
          retention-days: 7

  release:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: build
          merge-multiple: true
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GHOSTTY_VERSION: ${{ needs.resolve.outputs.ghostty_version }}
          PKG_REVISION: ${{ needs.resolve.outputs.pkg_revision }}
        run: |
          TAG="v${GHOSTTY_VERSION}-${PKG_REVISION}"
          TITLE="Ghostty ${GHOSTTY_VERSION} (rev ${PKG_REVISION})"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$TAG" build/*.deb --repo "${{ github.repository }}" --clobber
          else
            gh release create "$TAG" build/*.deb \
              --repo "${{ github.repository }}" \
              --title "$TITLE" \
              --generate-notes
          fi
